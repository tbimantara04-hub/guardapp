<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gate Control System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .container { max-width: 1000px; }
        .table-container { overflow-x: auto; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 1rem; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .badge { padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-size: 0.75rem; font-weight: 600; background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem 1rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .danger-btn { background-color: var(--error); color: white; border: none; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 700; border-radius: 0.5rem; cursor: pointer; transition: all 0.3s; }
        .danger-btn:hover { background-color: #dc2626; transform: translateY(-1px); }
        .danger-btn:active { transform: translateY(0); }
        .action-btn { background-color: var(--success); color: white; border: none; padding: 0.3rem 0.7rem; font-size: 0.75rem; font-weight: 600; border-radius: 0.375rem; cursor: pointer; transition: all 0.3s; }
        .action-btn:hover { background-color: #059669; transform: translateY(-1px); }
        .action-btn:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🛡️ Poltek SSN</div>
            <h1>Dashboard Control</h1>
            <p>Monitoring data mahasiswa dan audit log</p>
        </header>

        <main>
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('entries')">Data Mahasiswa</button>
                <button class="tab-btn" onclick="showTab('audit')">Audit Log</button>
            </div>

            <div id="entriesTab" class="card glass">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
                    <h3 style="margin: 0;">Log Mahasiswa Keluar</h3>
                    <button class="danger-btn" onclick="deleteAllEntries()">Sudah Kembali Semua</button>
                </div>
                <div class="table-container">
                    <table id="entriesTable">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>NPM</th>
                                <th>Nama Taruna</th>
                                <th>Keterangan</th>
                                <th>Waktu</th>
                                <th>Guard</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="auditTab" class="card glass" style="display: none;">
                <h3>System Audit Log</h3>
                <div class="table-container">
                    <table id="auditTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Guard ID</th>
                                <th>Action</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="actions">
                <a href="/" class="secondary-btn">Kembali ke Form Input</a>
            </div>
        </main>
    </div>

    <script>
        // Mock confirm for automation testing if ?test=true is in URL
        if (new URLSearchParams(window.location.search).has('test')) {
            window.confirm = () => true;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 4000);
        }

        async function fetchData() {
            const entriesRes = await fetch('/api/get_entries');
            const entries = await entriesRes.json();
            const entriesBody = document.querySelector('#entriesTable tbody');
            entriesBody.innerHTML = entries.map((e, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><span class="badge">${e.npm}</span></td>
                    <td>${e.name}</td>
                    <td>${e.keterangan || '-'}</td>
                    <td>${e.timestamp}</td>
                    <td>${e.guard_id}</td>
                    <td><button class="action-btn" onclick="deleteEntry(${e.id})">Sudah Kembali</button></td>
                </tr>
            `).join('');

            const auditRes = await fetch('/api/get_audit_logs');
            const logs = await auditRes.json();
            const auditBody = document.querySelector('#auditTable tbody');
            auditBody.innerHTML = logs.map(l => `
                <tr>
                    <td>${l.id}</td>
                    <td>${l.guard_id}</td>
                    <td>${l.action}</td>
                    <td>${l.timestamp}</td>
                </tr>
            `).join('');
        }

        async function deleteEntry(id) {
            if (!confirm("Tandai mahasiswa ini telah kembali ke kampus?")) return;
            try {
                const res = await fetch(`/api/delete_entry/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast("Status mahasiswa berhasil diperbarui (telah kembali)!");
                    fetchData();
                } else {
                    const err = await res.json();
                    showToast("Gagal memperbarui: " + err.message, "error");
                }
            } catch (error) {
                console.error(error);
                showToast("Terjadi kesalahan sistem", "error");
            }
        }

        async function deleteAllEntries() {
            if (!confirm("Tandai SEMUA mahasiswa telah kembali dan kosongkan log keluar?")) return;
            try {
                const res = await fetch('/api/delete_all_entries', { method: 'DELETE' });
                if (res.ok) {
                    showToast("Semua log keluar berhasil dikosongkan!");
                    fetchData();
                } else {
                    const err = await res.json();
                    showToast("Gagal mengosongkan: " + err.message, "error");
                }
            } catch (error) {
                console.error(error);
                showToast("Terjadi kesalahan sistem", "error");
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
            
            if (tab === 'entries') {
                document.getElementById('entriesTab').style.display = 'block';
                document.getElementById('auditTab').style.display = 'none';
            } else {
                document.getElementById('entriesTab').style.display = 'none';
                document.getElementById('auditTab').style.display = 'block';
            }
        }

        fetchData();
        // Refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
    <div id="toast" class="toast"></div>
</body>
</html>
