<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keamanan Gate - Poltek SSN</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('auth_token')) {
            window.location.href = '/login';
        }
    </script>
    <style>
        select.massal-mode {
            height: 150px;
        }
        select option {
            padding: 8px;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        select option:checked {
            background: var(--primary) linear-gradient(0deg, var(--primary) 0%, var(--primary) 100%);
        }
        .help-text {
            font-size: 0.8rem;
            color: var(--secondary);
            margin-top: 5px;
        }
        .mode-toggle-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        .mode-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .mode-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        #massal_help {
            display: none; /* hidden by default in individu mode */
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="glass-panel">
            <header>
                <div class="logo">
                    <img src="assets/logo.png" alt="Logo Poltek SSN" onerror="this.style.display='none'; document.getElementById('logo_text').style.display='inline';">
                    <span id="logo_text" style="display:none;">🛡️ Poltek SSN</span>
                </div>
                <div style="position: absolute; right: 2rem; top: 2rem;">
                    <button onclick="logout()" class="mode-btn" style="background: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.5);">Keluar / Logout</button>
                </div>
                <div class="security-badge">
                    <span class="icon">🔒</span> Protected by RSA-2048 & Fernet
                </div>
                <h1 id="page_title">Gate Log System</h1>
                <p id="page_subtitle">Input Data Keluar Mahasiswa (Individu)</p>
            </header>

            <div class="mode-toggle-container">
                <button type="button" class="mode-btn" id="toggleModeBtn">🔄 Beralih ke Keluar Massal</button>
            </div>

            <main>
                <form id="entryForm">
                    <div class="form-group">
                        <label for="guard_id">User ID Satpam</label>
                        <input type="text" id="guard_id" placeholder="Contoh: S-001 / Satpam Budi" required readonly style="background: rgba(0,0,0,0.2); cursor: not-allowed;">
                        <div class="help-text">*ID Satpam terisi otomatis dari data login.</div>
                    </div>

                    <div class="divider"></div>

                    <div class="form-group">
                        <label for="npm_select">Pilih Mahasiswa (NPM - Nama)</label>
                        <select id="npm_select" required>
                            <option value="" disabled selected>Memuat data mahasiswa...</option>
                        </select>
                        <div class="help-text" id="massal_help">*Tahan tombol CTRL untuk memilih lebih dari satu mahasiswa (Keluar Massal)</div>
                    </div>

                    <div class="form-group">
                        <label for="keterangan">Keterangan / Tujuan</label>
                        <select id="keterangan" required>
                            <option value="" disabled selected>Pilih Keterangan...</option>
                            <option value="Pesiar">Pesiar</option>
                            <option value="IB (Izin Bermalam)">IB (Izin Bermalam)</option>
                            <option value="Berobat">Berobat</option>
                            <option value="Dinas Luar">Dinas Luar</option>
                            <option value="Pulang Kampung">Pulang Kampung</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-primary">
                        <span class="btn-text">Kirim Data Terenkripsi</span>
                        <div class="spinner" id="spinner"></div>
                    </button>
                </form>
            </main>
            
            <div class="footer-actions">
                <a href="/dashboard" class="link-btn">Lihat Dashboard Monitoring &rarr;</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script>
        document.getElementById('guard_id').value = localStorage.getItem('auth_user') || '';
        function logout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('auth_user');
            window.location.href = '/login';
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
